<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtueller Baukasten</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #222;
            color: white;
            font-family: sans-serif;
        }

        canvas {
            display: block;
            background: #1a1a1a;
            touch-action: none;
        }

        #toolbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            width: 100%;
            background: #333;
            padding: 6px 8px;
            display: flex;
            gap: 6px;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            flex-wrap: wrap;
            z-index: 100;
        }

        .tool {
            padding: 8px 12px;
            background: #555;
            border-radius: 4px;
            cursor: pointer;
            user-select: none;
            font-size: 12px;
            white-space: nowrap;
            border: 2px solid transparent;
            transition: background 0.2s;
        }

        .tool:hover {
            background: #666;
        }

        .tool.active {
            background: #0f8;
            color: #222;
            font-weight: bold;
        }

        #mode-label {
            margin-right: 10px;
            font-size: 12px;
            opacity: 0.8;
        }
    </style>
</head>
<body>

<canvas id="board"></canvas>

<div id="toolbar">
    <span id="mode-label">Modus: Elektronik</span>
    <div class="tool" data-mode="elektronik">Elektronik</div>
    <div class="tool" data-mode="logik">Logik</div>
    <div class="tool" data-add="LED">LED</div>
    <div class="tool" data-add="SWITCH">Schalter</div>
    <div class="tool" data-add="AND">AND</div>
    <div class="tool" data-add="OR">OR</div>
    <div class="tool" data-add="NOT">NOT</div>
    <div class="tool" id="save-btn">Speichern</div>
    <div class="tool" id="load-btn">Laden</div>
</div>

<script src="app.js"></script>
</body>
</html>
